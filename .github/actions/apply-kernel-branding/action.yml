name: 'Apply Kernel Branding & Timestamp'
description: 'Apply Wild kernel branding to kernel version string'

inputs:
  variant:
    description: 'Variant of kernel to apply branding to'
    required: true
  kernel_version:
    description: 'Kernel version'
    required: true
    default: "6.6"
  android_version:
    description: 'Android version'
    required: true
    default: "android15"
  version:
    description: 'Combined version'
    required: true
    default: "android15-6.6"
  sublevel:
    description: 'Sublevel of kernel version'
    required: true
    default: "89"

runs:
  using: "composite"
  steps:
    - name: Apply Kernel Name Branding
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        VERSION="${{ inputs.version }}"
        ANDROID_PART=$(echo "$VERSION" | cut -d- -f1)
        KERNEL_PART=$(echo "$VERSION" | cut -d- -f2)
        SUBLEVEL="${{ inputs.sublevel }}"

        if [[ "$VERSION" == "android15-6.6" || "$VERSION" == "android16-6.12" ]]; then
          KERNEL_STRING="$KERNEL_PART.$SUBLEVEL-$ANDROID_PART"
          sed -i '$d' scripts/setlocalversion
          echo "echo \"$KERNEL_STRING-Wild\"" >> scripts/setlocalversion
        else
          sed -i '$d' scripts/setlocalversion
          echo "echo \"-$ANDROID_PART-Wild\"" >> scripts/setlocalversion
        fi

        chmod +x scripts/setlocalversion
